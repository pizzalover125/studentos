services:
  - type: web
    name: student-os
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    repo: https://github.com/pizzalover125/studentos
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /up
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: student-os-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"

databases:
  - name: student-os-db
    plan: free
    region: oregon
